worker_processes  1;

events {
    worker_connections  1024;
}


http {
    include       mime.types;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    default_type  application/octet-stream;

    keepalive_timeout  65;

    server {
        listen 80;
        server_name openbat.isea.rwth-aachen.de;
        return 301 https://openbat.isea.rwth-aachen.de$request_uri;
    }

    server {
        listen       443 ssl;

        server_name  openbat.isea.rwth-aachen.de;
    	ssl_protocols TLSv1.2 TLSv1.3;

        location = / {
            return 303 https://scarica.isea.rwth-aachen.de/bmgen;
        }

        location /bmgen/api {
            proxy_set_header Host $http_host;
            rewrite ^/bmgen/(.*) /$1 break;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $http_host;
            proxy_pass http://app:8000/;
        }

        location /bmgen {
            root /var/www;
        }

        ssl_certificate      /etc/ssl/certs/openbat.isea.rwth_aachen.de.pem;
        ssl_certificate_key  /etc/ssl/private/private.key;

        ssl_session_cache    shared:SSL:1m;
        ssl_session_timeout  5m;

        ssl_ciphers  HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers  on;
    }



}
