stages:
  - test
  - build
  - docker
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PACKAGE_NAME: bmgen
  DOCKER_BUILDKIT: 1
  DOCKER_DRIVER: overlay2

cache:
  paths:
    - .cache/pip

programtest:
  stage: test
  image: python:3.10
  script:
    - pip install -r requirements.txt
    - pip install -e .
    - python ./tests/run_tests.py

build-backend:
  stage: build
  image: python:3.10
  rules:
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
  script:
    - pip install twine build
    - python -m build
    - TWINE_PASSWORD=${CI_JOB_TOKEN} TWINE_USERNAME=gitlab-ci-token python -m twine upload --repository-url ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/pypi dist/*
  artifacts:
    paths:
      - dist/

build-frontend:
  stage: build
  image: node:20.7
  rules:
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
  script:
    - cd src/bmgen/web/client
    - npm install
    - mv node_modules public
  artifacts:
    paths:
      - src/bmgen/web/client/public

docker-frontend:
  stage: docker
  image: docker:20.10
  rules:
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  script:
    - docker build src/bmgen/web/client --cache-from "$CI_REGISTRY_IMAGE:frontend" --tag "$CI_REGISTRY_IMAGE:frontend"
    - docker push "$CI_REGISTRY_IMAGE:frontend"

docker-backend:
  stage: docker
  image: docker:20.10
  rules:
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  script:
    - cp dist/bmgen-*-py3-none-any.whl src/bmgen/web/server
    - docker build src/bmgen/web/server --cache-from "$CI_REGISTRY_IMAGE:backend" --tag "$CI_REGISTRY_IMAGE:backend"
    - docker push "$CI_REGISTRY_IMAGE:backend"

deploy:
  stage: deploy
  image: alpine:3.18.3
  rules:
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
  before_script:
    - apk add openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - echo "$KNOWN_HOSTS" > ~/.ssh/known_hosts
    - chmod 700 ~/.ssh
  script:
    - scp ./src/bmgen/web/docker-compose.yml bmgen@openbat.isea.rwth-aachen.de:~
    - ssh bmgen@openbat.isea.rwth-aachen.de "docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY && docker pull git.isea.rwth-aachen.de:5050/ess/testing/bmgen:frontend && docker pull git.isea.rwth-aachen.de:5050/ess/testing/bmgen:backend"
    - ssh bmgen@openbat.isea.rwth-aachen.de "docker compose down ; docker compose up -d"

pages:
  stage: deploy
  image: python:3.10
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  artifacts:
    paths:
      - public
  script:
    - pip install -r requirements.txt
    - pip install .
    - sphinx-apidoc -o ./sphinx/bmgen ./src
    - make -C ./sphinx html
    - cp -r ./sphinx/_build/html/ ./public
