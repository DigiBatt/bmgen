<html>

<head>
    <title>BM Generator 3000</title>

    <style type="text/css">
        table,
        th,
        td {
            border: 1px solid black;
            border-collapse: collapse;
            vertical-align: top;
            text-align: center;
        }

    </style>

    <script src="blockly/blockly_compressed.js"></script>
    <script src="blockly/javascript_compressed.js"></script>
    <script src="blockly/blocks_compressed.js"></script>
    <script src="blockly/msg/js/en.js"></script>

    <script src="blockly/closure/goog/base.js"></script>
    <script src="deps.js"></script>
    <script>goog.require("BMGen3000");</script>
</head>

<body onload="BMGen3000.loadBMGen()">
    <h1>BM Generator 3000</h1>
    <button onclick="BMGen3000.saveProgram()">Save</button>
    <input type="file" name="Load" onchange="BMGen3000.loadProgram(this.files)" />
    <button onclick="BMGen3000.addVariable()">Add variable</button>
    <button onclick="BMGen3000.addChannel()">Add channel</button>
    Program Name:
    <input type="text" id="programName" />
    <div id="wrapper" style="height: 90%;">
        <div id="blocklyArea" style="text-align: center; height: 100%; width: 70%; float: left"></div>
        <textarea id="codearea" style="overflow: auto; height: 45%; width: 30%"></textarea>
        <input type="checkbox" id="bm_format"> BM Format
        <div id="bmarea" style="overflow: auto; height: 45%; width: 30%"></div>
    </div>
    <div id="blocklyDiv" style="position: absolute;"></div>

</body>

</html>
